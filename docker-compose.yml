services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: FIFA_Raffle_2026
    restart: unless-stopped
    # No host port published. cloudflared reaches this container privately
    # over the shared compose network at http://web:8080. Nothing is
    # exposed on the host — Cloudflare is the only way in.
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    mem_limit: 128m
    pids_limit: 100

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_FIFA_RAFFLE
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - web
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    mem_limit: 128m
    pids_limit: 100
