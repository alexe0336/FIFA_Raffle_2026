services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup_web
    restart: unless-stopped
    # No host port published. cloudflared (running in its own compose project)
    # reaches this container by name over the shared "tunnel-net" network at
    # http://worldcup_web:8080. Nothing is exposed on the host.
    networks:
      - tunnel-net
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    mem_limit: 128m
    pids_limit: 100

networks:
  tunnel-net:
    external: true
