services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup_web
    restart: unless-stopped
    ports:
      - "3100:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    mem_limit: 128m
    pids_limit: 100
